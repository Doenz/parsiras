<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D6B1F"/>
      <stop offset="100%" stop-color="#1C3A0A"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E0"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Hinterer Berg (links, transparent) -->
  <polygon points="80,400 210,190 310,400" fill="white" opacity="0.22"/>

  <!-- Hinterer Berg (rechts, transparent) -->
  <polygon points="260,400 390,185 490,400" fill="white" opacity="0.18"/>

  <!-- Hauptberg -->
  <polygon points="256,72 430,400 82,400" fill="white"/>

  <!-- Schneekuppe -->
  <polygon points="256,72 305,175 207,175" fill="white"/>
  <!-- Schnee-Schatten für Tiefe -->
  <polygon points="256,72 305,175 256,155" fill="#D4EDBA" opacity="0.6"/>

  <!-- Berg-Schatten für Tiefe -->
  <polygon points="256,155 430,400 310,400" fill="#D4EDBA" opacity="0.25"/>

  <!-- Hütte Wände -->
  <rect x="208" y="330" width="100" height="70" rx="4" fill="#8B1A1A"/>

  <!-- Hütte Dach -->
  <polygon points="196,335 258,292 320,335" fill="#6B1212"/>

  <!-- Hütte Tür -->
  <rect x="242" y="354" width="28" height="46" rx="4" fill="#1C3A0A"/>

  <!-- Hütte Fenster links -->
  <rect x="214" y="344" width="20" height="18" rx="3" fill="#AED6F1" opacity="0.85"/>
  <!-- Fensterkreuz -->
  <line x1="224" y1="344" x2="224" y2="362" stroke="#1C3A0A" stroke-width="1.5" opacity="0.5"/>
  <line x1="214" y1="353" x2="234" y2="353" stroke="#1C3A0A" stroke-width="1.5" opacity="0.5"/>

  <!-- Hütte Fenster rechts -->
  <rect x="278" y="344" width="20" height="18" rx="3" fill="#AED6F1" opacity="0.85"/>
  <!-- Fensterkreuz -->
  <line x1="288" y1="344" x2="288" y2="362" stroke="#1C3A0A" stroke-width="1.5" opacity="0.5"/>
  <line x1="278" y1="353" x2="298" y2="353" stroke="#1C3A0A" stroke-width="1.5" opacity="0.5"/>

  <!-- Boden / Wiese -->
  <rect x="82" y="396" width="348" height="8" rx="4" fill="#4A7C24" opacity="0.5"/>
</svg>
